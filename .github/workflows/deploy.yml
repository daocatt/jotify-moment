name: Production CD (Jotify Moment)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Verify Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Remote SSH Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          script: |
            set -e

            PROJECT_PATH="${{ secrets.VPS_PROJECT_PATH }}"
            ENV_FILE="${{ secrets.VPS_ENV_FILE }}"

            cd "$PROJECT_PATH"
            echo "🚀 Deployment started at $(date)"

            # 1. Sync code
            echo "📥 Fetching latest code..."
            git fetch --all
            git checkout -B main origin/main
            git reset --hard origin/main

            # 2. Clean and prepare
            echo "🧹 Cleaning legacy build artifacts..."
            cp "$ENV_FILE" .env

            # 3. Build Docker images
            echo "📦 Building new Docker images..."
            docker compose build --no-cache 2>&1 | grep -vE '(DATABASE_URL|BETTER_AUTH_SECRET|POSTGRES_PASSWORD)'

            # 4. Start database
            echo "🗄️ Bootstrapping database..."
            docker compose up -d db
            sleep 3

            # 5. Start all services
            echo "🚀 Starting containers..."
            docker compose up -d

            # 7. Cleanup
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment successful!"
