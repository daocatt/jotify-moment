services:
  db:
    image: postgres:17-alpine
    container_name: jotify-moment-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-jotify_moment}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - ${DOCKER_DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: jotify-moment-migrate
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: jotify-moment-web
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_DATA_PATH:-./data}/uploads:/app/public/uploads
